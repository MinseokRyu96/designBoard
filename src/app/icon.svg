<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경: 브랜드 블루 라운드 사각형 -->
  <rect width="32" height="32" rx="7" fill="#3366FF"/>
  <!-- 캘린더 그리드 상단 바 -->
  <rect x="5" y="6" width="22" height="2.5" rx="1.25" fill="white" opacity="0.4"/>
  <!-- 세로 구분선 -->
  <line x1="12" y1="6" x2="12" y2="26" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="19" y1="6" x2="19" y2="26" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- 가로 구분선 -->
  <line x1="5" y1="13" x2="27" y2="13" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="5" y1="20" x2="27" y2="20" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- 업무 칩 (이어지는 바) -->
  <rect x="5" y="14.5" width="14" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="20" y="14.5" width="7" height="4" rx="2" fill="white" opacity="0.55"/>
  <!-- 단일 업무 칩 -->
  <rect x="5" y="21.5" width="7" height="4" rx="2" fill="white" opacity="0.65"/>
  <rect x="13" y="21.5" width="14" height="4" rx="2" fill="white" opacity="0.45"/>
</svg>
